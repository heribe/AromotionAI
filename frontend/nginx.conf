# AromotionAI 前端 nginx 配置
# 职责：1) 托管前端静态文件 + SPA fallback
#       2) 反代 /api/v1 到后端容器（含 SSE 长连接特殊配置）

server {
    listen 80;
    server_name _;

    # 前端静态文件根目录
    root /usr/share/nginx/html;
    index index.html;

    # gzip 压缩（静态资源体积小，传输快）
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # ---------- 反代后端 API ----------
    # 注意：SSE 端点（/api/v1/analysis/*/progress）需要特殊配置，
    # 放在通用 /api/v1 之前，nginx 按最长前缀匹配。
    location ~ ^/api/v1/analysis/[^/]+/progress$ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 关键：关闭缓冲，否则事件会攒在 nginx 不推给浏览器
        proxy_buffering off;
        proxy_cache off;
        # 长连接超时（分析任务可能跑几分钟，给 10 分钟）
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        # SSE 不支持 chunked 压缩
        gzip off;
    }

    # 通用 API 反代（POST/GET 普通请求）
    location /api/v1/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 香调生成等长请求也较慢，给足超时
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # 允许上传 cookie 文件（multipart）
        client_max_body_size 20m;
    }

    # ---------- 前端静态资源 ----------
    # 带哈希的静态资源长缓存（Vite 产物文件名含 contenthash）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---------- SPA fallback ----------
    # React Router 客户端路由：所有未命中的路径回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
