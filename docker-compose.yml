# AromotionAI 单机部署
# 用法：
#   1. 在 backend/.env 填 GLM_API_KEY（见 backend/.env.example）
#   2. 把抖音 cookie 放到 ./backend/data/cookies/douyin.json
#   3. docker compose up -d --build
#   4. 访问 http://<服务器IP>
#
# 统一路径：本地开发与 docker 部署共用 backend/.env 与 backend/data/，
# 无需为部署单独复制凭据。数据持久化：backend/data 挂载到容器，容器重建不丢。

services:
  # ---------- 后端 ----------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aromotion-backend
    restart: unless-stopped
    # 直接读 backend/.env（与本地开发同源），不再依赖根目录 .env
    env_file:
      - ./backend/.env
    environment:
      # GLM_API_KEY / ZHIPUAI_BASE_URL 等由 env_file 注入；以下为容器内固定值或带默认值的覆盖
      APP_ENV: production
      # 生产同源（前端经 nginx 反代），CORS 实际不生效，保留以防直连后端
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      DATABASE_URL: sqlite:///./data/db/aromotion.db
      COOKIE_DIR: ./data/cookies
      STORAGE_LOCAL_PATH: ./data/media
      # Playwright 在容器内运行需要（无头模式）
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    volumes:
      # 统一挂载 backend/data，本地开发与部署共享 SQLite/media/cookie
      - ./backend/data/db:/app/data/db
      - ./backend/data/media:/app/data/media
      - ./backend/data/cookies:/app/data/cookies
    # 后端不对外暴露端口，只供 frontend 容器通过内部网络访问
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------- 前端（nginx：静态托管 + 反代后端）----------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aromotion-frontend
    restart: unless-stopped
    ports:
      # 对外暴露 80（生产可加 443 + HTTPS）
      - "80:80"
    depends_on:
      - backend
